<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>タイムシート入力アプリ</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <div class="controls-panel">
        <div class="control-group">
            <strong>データ管理:</strong>
            <button id="btn-export" class="btn btn-file">保存 (.json)</button>
            <input type="file" id="input-import" accept=".json" style="display: none;">
            <button id="btn-import" class="btn btn-file">読込</button>
            <button id="btn-export-pdf" class="btn btn-pdf">PDF書き出し</button>
            <span id="pdf-loading" style="display:none; color:#d32f2f; font-size:12px; margin-left:10px;">PDF生成中...少々お待ちください</span>
            
            <div style="flex-grow: 1; display: flex; justify-content: flex-end; align-items: center; gap: 10px;">
                <button id="btn-toggle-tablet" class="btn btn-tablet">📱 タブレットモード: OFF</button>
                <button id="btn-open-settings" class="btn btn-settings">⚙️ カラー設定</button>
                <button id="btn-open-reset" class="btn btn-reset">🗑️ クリア</button>
                <div id="btn-show-breakdown" class="douga-count-display" title="タップで内訳を表示">
                    総動画枚数: <span id="display-douga-count" style="font-size: 24px;">0</span> 枚
                </div>
            </div>
        </div>

        <div class="control-group">
            <label>タイトル: <input type="text" id="info-title" style="width: 120px;"></label>
            <label>話数: <input type="text" id="info-episode" style="width: 40px;"></label>
            <label>パート: <input type="text" id="info-part" style="width: 40px;"></label>
            <label>原画: <input type="text" id="info-animator" style="width: 80px;"></label>
            
            <span style="margin-left: 20px; border-left: 2px solid #ccc; padding-left: 15px;">
                <label><strong>編集中のカット:</strong>
                    <select id="select-active-cut" style="width: 80px;"></select>
                </label>
                <button id="btn-add-cut" class="btn" style="margin-left: 5px;">＋ カット追加</button>
            </span>
        </div>

        <div class="control-group">
            <label>Cut: <input type="text" id="info-cut" style="width: 60px;"></label>
            <span style="margin-left: 15px;"><strong>尺:</strong></span>
            <input type="number" id="input-sec" value="6" min="0" style="width: 40px;"> 秒 ＋
            <input type="number" id="input-frame" value="0" min="0" max="23" style="width: 40px;"> コマ
            
            <strong style="margin-left: 20px;">セル (原画/動画):</strong>
            <div id="cell-controls-container" style="display: flex; gap: 5px;"></div>
            <button id="btn-add-cell" class="btn">＋</button>
            <button id="btn-remove-cell" class="btn">－</button>
            
            <strong style="margin-left: 20px;">特殊入力:</strong>
            <button id="btn-toggle-lipsync" class="btn btn-lipsync">口パクモード: OFF (1:○, 2:△, 3:✕)</button>
        </div>
    </div>

    <div id="timesheet-wrapper">
        <div id="timesheet-container">
            </div>
    </div>

    <div id="virtual-numpad">
        <div class="numpad-grid">
            <button class="np-btn np-btn-lip" data-key="LipToggle">口パク切替</button>
            <button class="np-btn np-btn-func" data-key="/">/</button>
            <button class="np-btn np-btn-func" data-key="*">*</button>
            <button class="np-btn np-btn-action" data-key="Close">閉じる</button>
            <button class="np-btn" data-key="7">7</button>
            <button class="np-btn" data-key="8">8</button>
            <button class="np-btn" data-key="9">9</button>
            <button class="np-btn np-btn-func" data-key="BS">BS</button>
            <button class="np-btn" data-key="4">4</button>
            <button class="np-btn" data-key="5">5</button>
            <button class="np-btn" data-key="6">6</button>
            <button class="np-btn np-btn-func" data-key="Tab">Tab</button>
            <button class="np-btn" data-key="1">1</button>
            <button class="np-btn" data-key="2">2</button>
            <button class="np-btn" data-key="3">3</button>
            <button class="np-btn np-span-2-row" data-key="Enter">Enter</button>
            <button class="np-btn np-span-2-col" data-key="0">0</button>
            <button class="np-btn" data-key=".">.</button>
        </div>
    </div>

    <div id="modal-breakdown" class="modal-overlay">
        <div class="modal-content">
            <h3 class="modal-title">動画枚数 内訳</h3>
            <div id="warning-container" style="display:none;"></div>
            <div id="breakdown-list"></div>
            <div class="modal-actions">
                <button id="btn-close-breakdown" class="btn">閉じる</button>
            </div>
        </div>
    </div>

    <div id="modal-reset" class="modal-overlay">
        <div class="modal-content">
            <h3 class="modal-title" style="color: #d32f2f;">入力クリアの確認</h3>
            <p>マス目の入力を全てリセットします。よろしいですか？<br><span style="font-size: 12px; color: #666;">※全カットの入力データが消去されます。</span></p>
            <label style="display: flex; align-items: center; gap: 5px; cursor: pointer; margin-top: 15px; font-weight: bold;">
                <input type="checkbox" id="check-keep-info" checked> タイトル・話数・原画名などの作品情報を残す
            </label>
            <div class="modal-actions">
                <button id="btn-cancel-reset" class="btn">キャンセル</button>
                <button id="btn-execute-reset" class="btn" style="background: #ff4d4f; color: white; border-color: #ff4d4f;">リセット実行</button>
            </div>
        </div>
    </div>

    <div id="modal-settings" class="modal-overlay">
        <div class="modal-content">
            <h3 class="modal-title">カラー設定</h3>
            <div class="color-row"><label>用紙の背景色:</label><input type="color" id="color-bg"></div>
            <div class="color-row"><label>罫線・見出し色:</label><input type="color" id="color-line"></div>
            <div class="color-row"><label>入力文字色:</label><input type="color" id="color-text"></div>
            <div class="color-row"><label>口パク記号色:</label><input type="color" id="color-lip"></div>
            <div class="modal-actions">
                <button id="btn-reset-colors" class="btn">初期色に戻す</button>
                <button id="btn-save-colors" class="btn" style="background: #1890ff; color: white; border-color: #1890ff;">完了</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
