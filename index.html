<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>タイムシート入力アプリ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* =========================================
           カラー設定
        ========================================= */
        :root {
            --sheet-bg: #B8E090;
            --sheet-line: #30A850;
            --sheet-text: #000000;
        }

        body {
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #ececec;
            height: 100vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        /* --- 操作パネル --- */
        .controls-panel {
            background: #fff;
            padding: 15px 20px;
            margin-bottom: 15px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex-shrink: 0;
        }
        
        .control-group {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            padding-bottom: 8px;
            border-bottom: 1px dashed #ddd;
        }
        .control-group:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .control-group label {
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .control-group input[type="text"], 
        .control-group input[type="number"] {
            padding: 4px;
            border: 1px solid #ccc;
            border-radius: 3px;
        }

        .col-input { width: 35px; text-align: center; font-weight: bold; }

        .btn { padding: 4px 10px; cursor: pointer; border: 1px solid #aaa; background: #f0f0f0; border-radius: 3px; }
        .btn:hover { background: #e0e0e0; }
        .btn-file { background: #e6f7ff; border-color: #91d5ff; font-weight: bold; }
        .btn-pdf { background: #fff1f0; border-color: #ffa39e; font-weight: bold; }
        .btn-pdf:hover { background: #ffccc7; }
        
        .btn-lipsync { background: #fff; border-color: #d32f2f; color: #d32f2f; font-weight: bold; transition: 0.1s; }
        .btn-lipsync.active { background: #d32f2f; color: #fff; }

        /* --- 動画枚数表示 --- */
        .douga-count-display {
            margin-left: auto; 
            font-size: 16px; 
            font-weight: bold; 
            color: var(--sheet-line); 
            border: 2px solid var(--sheet-line); 
            padding: 4px 16px; 
            border-radius: 4px; 
            background: #eaf6eb;
        }

        /* =========================================
           タイムシート用紙 (.page) のスタイリング
        ========================================= */
        #timesheet-wrapper {
            flex-grow: 1;
            overflow-x: auto;
            overflow-y: auto;
            padding-bottom: 20px;
        }

        #timesheet-container {
            display: inline-flex;
            gap: 40px;
            align-items: flex-start;
        }

        .page {
            background-color: var(--sheet-bg);
            color: var(--sheet-line);
            padding: 20px 30px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.15);
            border-radius: 3px;
            min-width: max-content;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        /* --- ヘッダー枠 --- */
        .page-header {
            display: flex;
            border: 2px solid var(--sheet-line);
            margin-bottom: 25px; 
        }

        .info-box {
            border-right: 1px solid var(--sheet-line);
            position: relative;
            padding: 0 8px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .info-box:last-child {
            border-right: none;
        }

        .info-label {
            position: absolute;
            top: 2px;
            left: 4px;
            font-size: 9px;
            font-weight: normal;
            color: var(--sheet-line);
        }

        .info-unit {
            position: absolute;
            bottom: 3px;
            right: 4px;
            font-size: 10px;
            font-weight: normal;
            color: var(--sheet-line);
        }

        .info-val {
            color: var(--sheet-text);
            font-size: 18px; 
            font-weight: bold;
            text-align: center;
            width: 100%;
            line-height: 1;
        }

        /* --- 表のレイアウト --- */
        .page-tables {
            display: flex;
            gap: 30px;
        }

        table { border-collapse: collapse; border: 2px solid var(--sheet-line); }
        td { border: 1px solid var(--sheet-line); padding: 0; text-align: center; vertical-align: middle; position: relative; }

        thead { border-bottom: 2px solid var(--sheet-line); }
        
        th.group-header, th.sub-header, .col-sec {
            background-color: transparent; color: var(--sheet-line); font-weight: bold;
            border: 1px solid var(--sheet-line);
        }
        th.group-header { font-size: 11px; padding: 2px 0; border-bottom: 1px solid var(--sheet-line); }
        th.sub-header { font-size: 10px; height: 16px; border-bottom: none; }

        .col-sec { width: 45px; font-size: 10px; }
        .col-genga, .col-douga, .col-dialogue { width: 27px; min-width: 27px; max-width: 27px; }
        .col-cam { width: 35px; }

        th.col-dialogue { white-space: nowrap; font-size: 8px; letter-spacing: -1px; overflow: hidden; }

        input.cell-input {
            width: 100%; 
            height: 16px;
            border: none; 
            text-align: center;
            font-size: 14px; 
            outline: none; 
            background: transparent;
            color: var(--sheet-text); 
            box-sizing: border-box; 
            padding: 0;
            margin: 0;
            line-height: 16px;
            vertical-align: middle;
            position: relative;
            z-index: 1;
        }

        input.cell-input:focus { background-color: #e6f7ff !important; }
        body.lip-sync-mode input.cell-input:focus { background-color: #ffe0e0 !important; }

        td.col-dialogue { border-top: none; border-bottom: none; }

        .lip-sync-mark {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            color: rgba(220, 0, 0, 0.45); 
            pointer-events: none; 
            z-index: 2; 
        }

        .hold-line {
            color: transparent !important;
            background-image: linear-gradient(to right, transparent calc(50% - 1px), var(--sheet-text) calc(50% - 1px), var(--sheet-text) calc(50% + 1px), transparent calc(50% + 1px)) !important;
        }
        .hold-line:focus { color: var(--sheet-text) !important; background-image: none !important; }

        .border-6frames td { border-bottom: 2px solid var(--sheet-line); }
        .border-1second td { border-bottom: 3px solid var(--sheet-line); }
        .end-of-cut td { border-bottom: 4px solid #d32f2f !important; }

        .out-of-duration {
            background: repeating-linear-gradient( -45deg, transparent, transparent 5px, var(--sheet-line) 5px, var(--sheet-line) 6px ) !important;
        }
        .out-of-duration input { color: transparent; pointer-events: none; }
    </style>
</head>
<body>

    <div class="controls-panel">
        <div class="control-group">
            <strong>データ出力:</strong>
            <button id="btn-export" class="btn btn-file">保存 (.json)</button>
            <input type="file" id="input-import" accept=".json" style="display: none;">
            <button id="btn-import" class="btn btn-file">読込</button>
            <button id="btn-export-pdf" class="btn btn-pdf">PDF書き出し</button>
            <span id="pdf-loading" style="display:none; color:#d32f2f; font-size:12px; margin-left:10px;">PDF生成中...少々お待ちください</span>
            
            <div class="douga-count-display">
                総動画枚数: <span id="display-douga-count" style="font-size: 24px;">0</span> 枚
            </div>
        </div>

        <div class="control-group">
            <label>タイトル: <input type="text" id="info-title" style="width: 120px;"></label>
            <label>話数: <input type="text" id="info-episode" style="width: 40px;"></label>
            <label>パート: <input type="text" id="info-part" style="width: 40px;"></label>
            <label>Cut: <input type="text" id="info-cut" style="width: 60px;"></label>
            <label>原画: <input type="text" id="info-animator" style="width: 80px;"></label>
            <span style="margin-left: 15px;"><strong>尺:</strong></span>
            <input type="number" id="input-sec" value="6" min="0" style="width: 40px;"> 秒 ＋
            <input type="number" id="input-frame" value="0" min="0" max="23" style="width: 40px;"> コマ
        </div>

        <div class="control-group">
            <strong>セル (原画/動画):</strong>
            <div id="cell-controls-container" style="display: flex; gap: 5px;"></div>
            <button id="btn-add-cell" class="btn">＋</button>
            <button id="btn-remove-cell" class="btn">－</button>
            
            <strong style="margin-left: 20px;">特殊入力:</strong>
            <button id="btn-toggle-lipsync" class="btn btn-lipsync">口パクモード: OFF (1:○, 2:△, 3:✕)</button>
        </div>
    </div>

    <div id="timesheet-wrapper">
        <div id="timesheet-container">
            </div>
    </div>

    <script>
        const CONFIG = { fps: 24, secondsPerBlock: 3, blocksPerPage: 2, subDivisionFrame: 6, lsKey: 'timesheet_app_data' };

        let state = {
            title: '', episode: '', part: '', cut: '', animator: '',
            durationSec: 6, durationFrame: 0, 
            cellCols: ['A', 'B', 'C', 'D', 'E', 'F', 'G'], 
            data: {}, lipData: {} 
        };

        let isLipSyncMode = false;

        document.addEventListener('DOMContentLoaded', () => {
            loadState(); initUI(); generateTimesheet(); setupKeyboardNavigation();
            updateDougaCountDisplay();
        });

        // 保存時に動画枚数も再計算して表示を更新する
        function saveState() { 
            localStorage.setItem(CONFIG.lsKey, JSON.stringify(state)); 
            updateDougaCountDisplay();
        }

        function migrateParsedData(parsed) {
            let newData = { ...parsed.data };
            let newLip = { ...parsed.lipData };
            
            parsed.cellCols.forEach((c, index) => {
                if (c && newData[`genga_${c}`] !== undefined) {
                    newData[`genga_col${index}`] = newData[`genga_${c}`]; delete newData[`genga_${c}`];
                }
                if (c && newData[`douga_${c}`] !== undefined) {
                    newData[`douga_col${index}`] = newData[`douga_${c}`]; delete newData[`douga_${c}`];
                }
                if (c && newLip[`genga_${c}`] !== undefined) {
                    newLip[`genga_col${index}`] = newLip[`genga_${c}`]; delete newLip[`genga_${c}`];
                }
                if (c && newLip[`douga_${c}`] !== undefined) {
                    newLip[`douga_col${index}`] = newLip[`douga_${c}`]; delete newLip[`douga_${c}`];
                }
            });
            parsed.data = newData;
            parsed.lipData = newLip;
            return parsed;
        }

        function loadState() {
            const saved = localStorage.getItem(CONFIG.lsKey);
            if (saved) {
                try {
                    let parsed = JSON.parse(saved);
                    if (parsed.gengaCols && !parsed.cellCols) parsed.cellCols = parsed.gengaCols;
                    if (!parsed.cellCols || parsed.cellCols.length === 0) parsed.cellCols = ['A', 'B', 'C', 'D', 'E', 'F', 'G'];
                    if (!parsed.lipData) parsed.lipData = {};
                    
                    state = migrateParsedData(parsed);
                } catch (e) {}
            }
        }

        // --- 動画枚数カウントロジック ---
        function calculateDougaCount() {
            let totalCount = 0;
            const totalFrames = (state.durationSec * CONFIG.fps) + state.durationFrame;

            // 各列(A, B, C...)ごとに独立して計算
            state.cellCols.forEach((_, index) => {
                const gKey = `genga_col${index}`;
                const dKey = `douga_col${index}`;
                
                // 原画列と動画列で、入力マス（空白・/以外）が多い方を採用
                let gCount = 0; let dCount = 0;
                for(let f=1; f<=totalFrames; f++) {
                    if (state.data[gKey] && state.data[gKey][f] && state.data[gKey][f].trim() !== '' && state.data[gKey][f] !== '/') gCount++;
                    if (state.data[dKey] && state.data[dKey][f] && state.data[dKey][f].trim() !== '' && state.data[dKey][f] !== '/') dCount++;
                }
                const targetKey = dCount >= gCount ? dKey : gKey;
                
                // 有効なフレームのリストを抽出（空白と/はスキップ）
                let validItems = [];
                for (let f = 1; f <= totalFrames; f++) {
                    let val = state.data[targetKey]?.[f]?.trim() || '';
                    if (val && val !== '/') {
                        let lip = state.lipData[targetKey]?.[f] || '';
                        validItems.push({ val, lip, frame: f });
                    }
                }

                let knownKeys = new Set();
                let knownSequences = {}; 
                let currentStartKey = null;
                let currentInbetweens = [];
                let colCount = 0;

                validItems.forEach(item => {
                    const isKeyPose = (item.val !== '・' && item.val !== '✕');
                    
                    if (isKeyPose) {
                        // キーポーズの初出判定（口パクは無視）
                        if (!knownKeys.has(item.val)) {
                            knownKeys.add(item.val);
                            colCount++;
                        }

                        if (currentStartKey !== null) {
                            const endKey = item.val;
                            const numInb = currentInbetweens.length;
                            if (numInb > 0) {
                                // 起点_終点_分割数 でシーケンスをグループ化
                                const seqKey = `${currentStartKey}_${endKey}_${numInb}`;
                                if (!knownSequences[seqKey]) {
                                    knownSequences[seqKey] = Array.from({length: numInb}, () => new Set());
                                }
                                
                                // 中割りの各位置における「記号＋口パク」の初出判定
                                currentInbetweens.forEach((inb, idx) => {
                                    const inbStr = `${inb.val}_${inb.lip}`;
                                    if (!knownSequences[seqKey][idx].has(inbStr)) {
                                        knownSequences[seqKey][idx].add(inbStr);
                                        colCount++;
                                    }
                                });
                            }
                        } else {
                            // 最初のキーポーズより前に中割りがあった場合の救済
                            colCount += currentInbetweens.length;
                        }

                        currentStartKey = item.val;
                        currentInbetweens = [];
                    } else {
                        // 中割り記号（・、✕）は一旦ストック
                        currentInbetweens.push(item);
                    }
                });

                // 終端にキーポーズが無く、中割りのままカットが終わった場合は全て新規加算
                if (currentInbetweens.length > 0) {
                    colCount += currentInbetweens.length;
                }

                totalCount += colCount;
            });

            return totalCount;
        }

        function updateDougaCountDisplay() {
            const countSpan = document.getElementById('display-douga-count');
            if (countSpan) {
                countSpan.textContent = calculateDougaCount();
            }
        }

        function generateFileName(extension) {
            const t = state.title || 'タイトル未定'; const e = state.episode || '話数未定';
            const p = state.part || 'パート未定'; const c = state.cut || 'cut未定';
            const a = state.animator || '原画未定'; const d = `${state.durationSec}秒${state.durationFrame}コマ`;
            return `${t}_${e}_${p}_${c}_${a}_${d}.${extension}`;
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = generateFileName('json');
            a.click(); URL.revokeObjectURL(url);
        }

        function importData(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    let parsed = JSON.parse(event.target.result);
                    if (!parsed.cellCols) parsed.cellCols = parsed.gengaCols || ['A', 'B', 'C', 'D', 'E', 'F', 'G'];
                    if (!parsed.lipData) parsed.lipData = {};
                    
                    state = migrateParsedData(parsed);
                    saveState(); initUIValues(); generateTimesheet();
                } catch (err) { alert('読み込みに失敗しました。'); }
                e.target.value = '';
            };
            reader.readAsText(file);
        }

        function exportPDF() {
            const loadingMsg = document.getElementById('pdf-loading');
            loadingMsg.style.display = 'inline';

            const printWrapper = document.createElement('div');
            printWrapper.style.position = 'absolute'; printWrapper.style.top = '0'; printWrapper.style.left = '0';
            printWrapper.style.width = '0'; printWrapper.style.height = '0'; printWrapper.style.overflow = 'hidden';

            const printContainer = document.createElement('div');
            printContainer.style.width = '297mm'; 

            const pages = document.querySelectorAll('.page');
            pages.forEach(page => {
                const clone = page.cloneNode(true);
                clone.style.margin = '0'; clone.style.boxShadow = 'none';

                const originalInputs = page.querySelectorAll('input.cell-input');
                const clonedInputs = clone.querySelectorAll('input.cell-input');
                
                originalInputs.forEach((input, index) => {
                    const div = document.createElement('div');
                    div.textContent = input.value;
                    div.style.cssText = window.getComputedStyle(input).cssText;
                    div.style.display = 'flex'; div.style.alignItems = 'center'; div.style.justifyContent = 'center';
                    clonedInputs[index].parentNode.replaceChild(div, clonedInputs[index]);
                });

                printContainer.appendChild(clone);
            });

            printWrapper.appendChild(printContainer); document.body.appendChild(printWrapper);

            const opt = {
                margin: 5, filename: generateFileName('pdf'),
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' },
                pagebreak: { mode: 'css', elements: '.page' }
            };

            html2pdf().set(opt).from(printContainer).save().then(() => {
                document.body.removeChild(printWrapper); loadingMsg.style.display = 'none';
            });
        }

        function initUI() {
            initUIValues();
            const fields = ['title', 'episode', 'part', 'cut', 'animator'];
            fields.forEach(field => {
                document.getElementById(`info-${field}`).addEventListener('input', (e) => {
                    state[field] = e.target.value; saveState(); generateTimesheet();
                });
            });

            document.getElementById('input-sec').addEventListener('input', (e) => { state.durationSec = parseInt(e.target.value, 10) || 0; saveState(); generateTimesheet(); });
            document.getElementById('input-frame').addEventListener('input', (e) => { state.durationFrame = parseInt(e.target.value, 10) || 0; saveState(); generateTimesheet(); });

            document.getElementById('btn-add-cell').addEventListener('click', () => { state.cellCols.push(getNextColName(state.cellCols)); saveState(); renderColumnInputs(); generateTimesheet(); });
            document.getElementById('btn-remove-cell').addEventListener('click', () => { if (state.cellCols.length > 1) { state.cellCols.pop(); saveState(); renderColumnInputs(); generateTimesheet(); } });

            document.getElementById('btn-export').addEventListener('click', exportData);
            document.getElementById('btn-import').addEventListener('click', () => document.getElementById('input-import').click());
            document.getElementById('input-import').addEventListener('change', importData);
            document.getElementById('btn-export-pdf').addEventListener('click', exportPDF);

            const btnLipSync = document.getElementById('btn-toggle-lipsync');
            btnLipSync.addEventListener('click', () => {
                isLipSyncMode = !isLipSyncMode;
                if (isLipSyncMode) {
                    btnLipSync.textContent = '口パクモード: ON (1:○, 2:△, 3:✕)';
                    btnLipSync.classList.add('active');
                    document.body.classList.add('lip-sync-mode');
                } else {
                    btnLipSync.textContent = '口パクモード: OFF (1:○, 2:△, 3:✕)';
                    btnLipSync.classList.remove('active');
                    document.body.classList.remove('lip-sync-mode');
                }
            });
        }

        function initUIValues() {
            document.getElementById('info-title').value = state.title || ''; document.getElementById('info-episode').value = state.episode || '';
            document.getElementById('info-part').value = state.part || ''; document.getElementById('info-cut').value = state.cut || '';
            document.getElementById('info-animator').value = state.animator || '';
            document.getElementById('input-sec').value = state.durationSec; document.getElementById('input-frame').value = state.durationFrame;
            renderColumnInputs();
        }

        function getNextColName(colsArray) {
            const validCols = colsArray.filter(c => c.trim() !== '');
            if (validCols.length === 0) return 'A';
            const last = validCols[validCols.length - 1];
            if (last.slice(-1) < 'Z') return last.slice(0, -1) + String.fromCharCode(last.charCodeAt(last.length - 1) + 1);
            else return last + 'A';
        }

        function renderColumnInputs() {
            const container = document.getElementById('cell-controls-container');
            container.innerHTML = ''; 
            state.cellCols.forEach((colName, index) => {
                const input = document.createElement('input'); input.type = 'text'; input.value = colName; input.className = 'col-input';
                
                input.addEventListener('change', (e) => {
                    state.cellCols[index] = e.target.value; 
                    saveState(); 
                    generateTimesheet();
                });
                container.appendChild(input);
            });
        }

        function generateTimesheet() {
            const container = document.getElementById('timesheet-container'); container.innerHTML = ''; 
            const framesPerPage = CONFIG.fps * CONFIG.secondsPerBlock * CONFIG.blocksPerPage;
            const totalFrames = (state.durationSec * CONFIG.fps) + state.durationFrame;
            const totalPages = Math.max(1, Math.ceil(totalFrames / framesPerPage));

            for (let p = 0; p < totalPages; p++) {
                const pageDiv = document.createElement('div'); pageDiv.className = 'page';
                pageDiv.appendChild(createPageHeader(p, totalPages));

                const tablesDiv = document.createElement('div'); tablesDiv.className = 'page-tables';
                for (let b = 0; b < CONFIG.blocksPerPage; b++) {
                    const startFrame = (p * framesPerPage) + (b * CONFIG.fps * CONFIG.secondsPerBlock) + 1;
                    const table = document.createElement('table');
                    table.appendChild(createTableHeader()); table.appendChild(createTableBody(startFrame, CONFIG.fps * CONFIG.secondsPerBlock, totalFrames));
                    tablesDiv.appendChild(table);
                }
                pageDiv.appendChild(tablesDiv); container.appendChild(pageDiv);
            }
            updateVisuals();
        }

        function createPageHeader(pageIndex, totalPages) {
            const header = document.createElement('div');
            header.className = 'page-header';
            header.innerHTML = `
                <div class="info-box" style="flex-grow: 2.5;">
                    <span class="info-label">タイトル</span>
                    <span class="info-val">${state.title}</span>
                </div>
                <div class="info-box" style="flex-grow: 1;">
                    <span class="info-val">${state.episode}</span>
                    <span class="info-unit">話</span>
                </div>
                <div class="info-box" style="flex-grow: 1;">
                    <span class="info-label">パート</span>
                    <span class="info-val">${state.part}</span>
                </div>
                <div class="info-box" style="flex-grow: 1.5;">
                    <span class="info-label">カットナンバー</span>
                    <span class="info-val">${state.cut}</span>
                </div>
                <div class="info-box" style="flex-grow: 2.5; display: flex; align-items: center; justify-content: center;">
                    <div style="display: flex; align-items: flex-end; justify-content: center;">
                        <span class="info-val" style="width: auto; line-height: 1;">${state.durationSec}</span>
                        <span class="info-unit" style="position: static; font-size: 10px; margin: 0 4px 2px 4px;">秒 ＋</span>
                        <span class="info-val" style="width: auto; line-height: 1;">${state.durationFrame}</span>
                        <span class="info-unit" style="position: static; font-size: 10px; margin: 0 0 2px 4px;">コマ</span>
                    </div>
                </div>
                <div class="info-box" style="flex-grow: 2;">
                    <span class="info-label">原画</span>
                    <span class="info-val">${state.animator}</span>
                </div>
                <div class="info-box" style="flex-grow: 1.5;">
                    <span class="info-label">シート</span>
                    <span class="info-val">${pageIndex + 1} / ${totalPages}</span>
                    <span class="info-unit">枚目</span>
                </div>
            `;
            return header;
        }

        function createTableHeader() {
            const thead = document.createElement('thead'); const tr1 = document.createElement('tr');
            const thSec = document.createElement('th'); thSec.textContent = 'Sec'; thSec.rowSpan = 2; thSec.className = 'group-header col-sec'; tr1.appendChild(thSec);
            const appendGrp = (txt, col) => { const th = document.createElement('th'); th.textContent = txt; th.colSpan = col; th.className = 'group-header'; tr1.appendChild(th); };

            appendGrp('原画', state.cellCols.length);
            const thDial = document.createElement('th'); thDial.textContent = 'セリフ'; thDial.rowSpan = 2; thDial.className = 'group-header col-dialogue'; tr1.appendChild(thDial);
            appendGrp('動画', state.cellCols.length); 
            
            const thCam = document.createElement('th'); thCam.textContent = 'カメラ'; thCam.rowSpan = 2; thCam.colSpan = 3; thCam.className = 'group-header col-cam'; tr1.appendChild(thCam);
            thead.appendChild(tr1);

            const tr2 = document.createElement('tr');
            const appendSub = (cols) => { 
                cols.forEach(c => { 
                    const th = document.createElement('th'); 
                    th.textContent = c; 
                    th.className = 'sub-header'; 
                    tr2.appendChild(th); 
                }); 
            };
            appendSub(state.cellCols); appendSub(state.cellCols); 
            thead.appendChild(tr2); return thead;
        }

        function createTableBody(startFrame, framesCount, totalFrames) {
            const tbody = document.createElement('tbody'); const cols = [];
            
            state.cellCols.forEach((c, index) => cols.push({ key: `genga_col${index}`, cls: 'col-genga' }));
            cols.push({ key: 'dialogue', cls: 'col-dialogue' });
            state.cellCols.forEach((c, index) => cols.push({ key: `douga_col${index}`, cls: 'col-douga' }));
            cols.push({ key: 'cam_1', cls: 'col-cam' }, { key: 'cam_2', cls: 'col-cam' }, { key: 'cam_3', cls: 'col-cam' });

            for (let i = 0; i < framesCount; i++) {
                const f = startFrame + i; const tr = document.createElement('tr');
                if (f % CONFIG.fps === 0) tr.classList.add('border-1second');
                else if (f % CONFIG.subDivisionFrame === 0) tr.classList.add('border-6frames');
                if (f === totalFrames) tr.classList.add('end-of-cut');

                const isOut = f > totalFrames; const tdF = document.createElement('td');
                tdF.className = 'col-sec'; if (isOut) tdF.classList.add('out-of-duration');
                tdF.textContent = f % CONFIG.fps === 0 ? `${Math.floor(f / CONFIG.fps)} sec` : f % CONFIG.fps; 
                tr.appendChild(tdF);

                cols.forEach(col => {
                    const td = document.createElement('td'); td.className = col.cls;
                    if (isOut) td.classList.add('out-of-duration');
                    const input = document.createElement('input');
                    input.type = 'text'; input.className = 'cell-input'; input.dataset.frame = f; input.dataset.colkey = col.key;
                    
                    if (state.data[col.key] && state.data[col.key][f]) input.value = state.data[col.key][f];
                    
                    if (state.lipData[col.key] && state.lipData[col.key][f]) {
                        const markDiv = document.createElement('div');
                        markDiv.className = 'lip-sync-mark';
                        markDiv.textContent = state.lipData[col.key][f];
                        td.appendChild(markDiv);
                    }

                    input.addEventListener('input', (e) => {
                        if (isLipSyncMode) {
                            e.target.value = state.data[col.key]?.[f] || '';
                            return;
                        }
                        if (!state.data[col.key]) state.data[col.key] = {};
                        state.data[col.key][f] = e.target.value; saveState(); updateVisuals(); 
                    });

                    input.addEventListener('blur', (e) => {
                        if (isLipSyncMode) return;
                        let v = e.target.value; let c = false;
                        if (v === '.') { v = '・'; c = true; } else if (v === '*') { v = '✕'; c = true; }
                        if (c) { e.target.value = v; state.data[col.key][f] = v; saveState(); updateVisuals(); }
                    });

                    if (isOut) input.disabled = true;
                    td.appendChild(input); tr.appendChild(td);
                });
                tbody.appendChild(tr);
            }
            return tbody;
        }

        function updateVisuals() {
            document.querySelectorAll('input.cell-input').forEach(input => {
                const val = input.value; const f = parseInt(input.dataset.frame, 10); const k = input.dataset.colkey;
                const isNarrow = input.parentElement.classList.contains('col-genga') || 
                                 input.parentElement.classList.contains('col-douga') ||
                                 input.parentElement.classList.contains('col-dialogue');

                if (isNarrow) {
                    if (val.length >= 3) input.style.fontSize = '9px';
                    else if (val.length === 2) input.style.fontSize = '11px';
                    else input.style.fontSize = '14px'; 
                }

                if (val === '/') {
                    const p = state.data[k] && state.data[k][f - 1] === '/';
                    const n = state.data[k] && state.data[k][f + 1] === '/';
                    if (p || n) input.classList.add('hold-line'); else input.classList.remove('hold-line');
                } else {
                    input.classList.remove('hold-line');
                }
            });
        }

        function setupKeyboardNavigation() {
            document.addEventListener('keydown', (e) => {
                const el = document.activeElement;
                if (el && el.tagName === 'INPUT' && el.dataset.frame) {
                    const f = parseInt(el.dataset.frame, 10); const k = el.dataset.colkey; let n = null;

                    if (isLipSyncMode) {
                        if (['1', '2', '3'].includes(e.key)) {
                            e.preventDefault();
                            const mark = e.key === '1' ? '○' : e.key === '2' ? '△' : '✕';
                            
                            if (state.lipData[k] && state.lipData[k][f] === mark) {
                                delete state.lipData[k][f];
                                let td = el.closest('td');
                                let existingMark = td.querySelector('.lip-sync-mark');
                                if (existingMark) existingMark.remove();
                                saveState();
                                return; 
                            }

                            if (!state.lipData[k]) state.lipData[k] = {};
                            state.lipData[k][f] = mark;
                            saveState();

                            let td = el.closest('td');
                            let markDiv = td.querySelector('.lip-sync-mark');
                            if (!markDiv) {
                                markDiv = document.createElement('div'); markDiv.className = 'lip-sync-mark'; td.appendChild(markDiv);
                            }
                            markDiv.textContent = mark;

                            const next = document.querySelector(`input[data-frame="${f + 1}"][data-colkey="${k}"]`);
                            if (next && !next.disabled) next.focus();
                            return;
                        }
                        
                        if (e.key === 'Backspace') {
                            e.preventDefault(); 
                            if (state.lipData[k] && state.lipData[k][f]) {
                                delete state.lipData[k][f];
                                let td = el.closest('td');
                                let markDiv = td.querySelector('.lip-sync-mark');
                                if (markDiv) markDiv.remove();
                                saveState();
                                return;
                            } else {
                                n = f - 1; 
                            }
                        } else if (e.key === 'ArrowDown' || e.key === 'Enter') { 
                            e.preventDefault(); n = f + 1; 
                        } else if (e.key === 'ArrowUp') { 
                            e.preventDefault(); n = f - 1; 
                        } else if (e.key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey) {
                            e.preventDefault();
                        }
                    } else {
                        if (e.key === 'ArrowDown' || e.key === 'Enter') { e.preventDefault(); n = f + 1; }
                        else if (e.key === 'ArrowUp') { e.preventDefault(); n = f - 1; }
                        else if (e.key === 'Backspace' && el.value === '') { e.preventDefault(); n = f - 1; }
                    }

                    if (n !== null && n > 0) {
                        const next = document.querySelector(`input[data-frame="${n}"][data-colkey="${k}"]`);
                        if (next && !next.disabled) next.focus();
                    }
                }
            });
        }
    </script>
</body>
</html>
